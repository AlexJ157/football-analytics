<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Football Analytics</title> 
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Football Analytics</h1>
            <p>Fixtures and predictions across major competitions</p>
        </header>

        <div class="controls">
            <div class="view-toggle">
                <button class="toggle-btn active" data-view="fixtures">Fixtures</button>
                <button class="toggle-btn" data-view="results">Results</button>
            </div>

            <select id="competition-select">
                <option value="all">All Competitions</option>
                <option value="Premier League">Premier League</option>
                <option value="La Liga">La Liga</option>
                <option value="Serie A">Serie A</option>
            </select>
        </div>
         
        <main id="fixtures"></main>

        <script src="script.js"></script>
    </body>
</html>
